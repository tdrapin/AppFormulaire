<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Plateforme de Formulaires</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #0f2437 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            max-width: 900px;
            width: 90%;
            overflow: hidden;
        }

        .login-form-section {
            flex: 1;
            padding: 60px 50px;
        }

        .login-image-section {
            flex: 1;
            background: linear-gradient(135deg, #ff9a56 0%, #ff7e5f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            min-height: 400px;
        }

        .image-placeholder {
            text-align: center;
            font-size: 80px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 12px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #7a8a9e;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-input {
            padding: 12px 14px;
            border: 1px solid #d0d7e0;
            border-radius: 6px;
            font-size: 13px;
            color: #2c3e50;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff9a56;
            box-shadow: 0 0 0 3px rgba(255, 154, 86, 0.1);
        }

        .form-input::placeholder {
            color: #b0c4de;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input {
            cursor: pointer;
            accent-color: #ff9a56;
        }

        .remember-me label {
            cursor: pointer;
        }

        .forgot-password {
            color: #ff9a56;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #ff7e5f;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #ff9a56 0%, #ff7e5f 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 154, 86, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0;
            color: #d0d7e0;
            font-size: 13px;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background-color: #d0d7e0;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d0d7e0;
            background-color: white;
            color: #2c3e50;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-social:hover {
            background-color: #f0f2f5;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: #7a8a9e;
        }

        .signup-link a {
            color: #ff9a56;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #ff7e5f;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .login-form-section {
                padding: 40px 25px;
            }

            .login-image-section {
                min-height: 200px;
                display: none;
            }

            .login-title {
                font-size: 22px;
            }

            .social-buttons {
                flex-direction: column;
            }

            .btn-social {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- FORM SECTION -->
        <div class="login-form-section">
            <div class="logo">FORMULAIRES</div>
            
            <h1 class="login-title">Bienvenue</h1>
            <p class="login-subtitle">Connectez-vous à votre compte</p>

            <form>
                <div class="form-group">
                    <label class="form-label">Adresse email</label>
                    <input type="email" class="form-input" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" placeholder="Entrez votre mot de passe" required>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Se souvenir de moi</label>
                    </div>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-login">Se connecter</button>

                <div class="divider">
                    <span></span>
                    <span>Ou</span>
                    <span></span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <span>🔵</span> Google
                    </button>
                    <button type="button" class="btn-social">
                        <span>🔷</span> Microsoft
                    </button>
                </div>

                <div class="signup-link">
                    Vous n'avez pas de compte ? <a href="#">S'inscrire gratuitement</a>
                </div>
            </form>
        </div>

        <!-- IMAGE SECTION -->
        <div class="login-image-section">
            <div class="image-placeholder"></div>
        </div>

    </div>

</body>
</html>
