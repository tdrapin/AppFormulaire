<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: #1a1f36;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 13px;
            color: #6b7280;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1a1f36;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input {
            cursor: pointer;
            accent-color: #667eea;
            width: 18px;
            height: 18px;
        }

        .checkbox-group label {
            cursor: pointer;
            font-weight: 600;
            color: #1a1f36;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .forgot-link:active {
            opacity: 0.8;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            background: #f9fbff;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-social:active {
            background: white;
            border-color: #667eea;
            transform: scale(0.95);
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link a:active {
            opacity: 0.8;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px 16px;
                border-radius: 12px;
            }

            .logo-text {
                font-size: 20px;
            }

            .btn-login {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Logo Section -->
        <div class="logo-section">
            
            <div class="logo-text">FORMULAIRES</div>
            <div class="logo-subtitle">Gestion Simplifiée</div>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMsg"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-input" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-actions">
                <label class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Se souvenir de moi</label>
                </label>
                <a href="#" class="forgot-link">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <!-- Divider -->
        <div class="divider">Ou</div>

        <!-- Social Login -->
        <div class="social-buttons">
            <button class="btn-social" title="Google">🔷</button>
            <button class="btn-social" title="Microsoft">◼️</button>
            <button class="btn-social" title="Apple">🍎</button>
        </div>

        <!-- Signup Link -->
        <div class="signup-link">
            Pas encore de compte ? <a href="register-mobile.html">S'inscrire</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }

            if (!email.includes('@')) {
                showError('Veuillez entrer un email valide');
                return;
            }

            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères');
                return;
            }

            // Simulate login
            errorMsg.classList.remove('show');
            alert('Connexion réussie ! Redirection...');
            // window.location.href = 'home-mobile.html';
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 3000);
        }

        // Social login handlers (placeholder)
        document.querySelectorAll('.btn-social').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                alert('Connexion sociale en développement');
            });
        });
    </script>

</body>
</html>
