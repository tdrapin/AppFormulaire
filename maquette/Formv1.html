<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Saisie - Véhicule Test Exceptionnelle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        /* ========== HEADER ========== */
        .header {
            background-color: #1a3a52;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-name {
            font-size: 13px;
            color: #b0c4de;
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ff9a56 0%, #ff7e5f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }

        /* ========== CONTAINER ========== */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ========== FORM HEADER ========== */
        .form-header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #e0e3e8;
        }

        .form-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 10px;
        }

        .form-subtitle {
            font-size: 14px;
            color: #7a8a9e;
        }

        /* ========== FORM ========== */
        .form {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e3e8;
        }

        .section {
            padding: 30px;
            border-bottom: 1px solid #e0e3e8;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #ff9a56;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 12px 14px;
            border: 1px solid #d0d7e0;
            border-radius: 6px;
            font-size: 13px;
            color: #2c3e50;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #ff9a56;
            box-shadow: 0 0 0 3px rgba(255, 154, 86, 0.1);
        }

        .form-input::placeholder {
            color: #b0c4de;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* ========== RADIO BUTTONS ========== */
        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #ff9a56;
        }

        .radio-item label {
            cursor: pointer;
            font-size: 13px;
        }

        /* ========== CHECKBOX ========== */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .checkbox-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: #ff9a56;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 13px;
            flex: 1;
        }

        .checkbox-detail {
            margin-left: 28px;
            margin-top: 8px;
        }

        .checkbox-detail input {
            width: 100%;
        }

        /* ========== UNIT DISPLAY ========== */
        .input-with-unit {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-with-unit input {
            flex: 1;
        }

        .unit {
            font-size: 13px;
            color: #7a8a9e;
            font-weight: 600;
            min-width: 50px;
        }

        /* ========== FORM ACTIONS ========== */
        .form-actions {
            padding: 30px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            border-top: 1px solid #e0e3e8;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-draft {
            background-color: #f0f2f5;
            color: #2c3e50;
            border: 1px solid #d0d7e0;
        }

        .btn-draft:hover {
            background-color: #e0e3e8;
        }

        .btn-preview {
            background-color: white;
            color: #1a3a52;
            border: 1px solid #d0d7e0;
        }

        .btn-preview:hover {
            background-color: #f0f2f5;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff9a56 0%, #ff7e5f 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 154, 86, 0.3);
        }

        /* ========== PROGRESS INDICATOR ========== */
        .progress-bar {
            height: 4px;
            background-color: #e0e3e8;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9a56 0%, #ff7e5f 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }

            .container {
                margin: 20px auto;
            }

            .form-header,
            .section,
            .form-actions {
                padding: 20px;
            }

            .form-title {
                font-size: 20px;
            }

            .radio-group {
                flex-direction: column;
                gap: 12px;
            }

            .form-actions {
                flex-direction: column-reverse;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- PROGRESS BAR -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">FORMULAIRES</div>
        <div class="header-right">
            <span class="user-name">Jean Dupont</span>
            <div class="profile-icon">JD</div>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        
        <!-- FORM HEADER -->
        <div class="form-header">
            <h1 class="form-title">Véhicule - Test exceptionnelle</h1>
            <p class="form-subtitle">Remplissez ce formulaire pour signaler un test effectué sur un véhicule.</p>
        </div>

        <!-- FORM -->
        <form class="form" id="mainForm">

            <!-- SECTION 1 : INFORMATIONS GÉNÉRALES -->
            <div class="section">
                <h2 class="section-title">Informations générales</h2>

                <div class="form-group">
                    <label class="form-label">N° du véhicule <span class="required">*</span></label>
                    <input type="text" class="form-input" placeholder="Ex: VEH-2026-001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Date <span class="required">*</span></label>
                    <input type="date" class="form-input" value="2026-04-14" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Période <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="period-it" name="periode" value="IT" checked>
                            <label for="period-it">IT</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="period-m" name="periode" value="M">
                            <label for="period-m">M</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION 2 : TEST EFFECTUÉ -->
            <div class="section">
                <h2 class="section-title">Test effectué</h2>
                <p style="font-size: 13px; color: #7a8a9e; margin-bottom: 16px;">Cochez la ou les cases pertinentes</p>

                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="replacement" name="test_type">
                        <label for="replacement">Après le remplacement d'un</label>
                    </div>
                    <div class="checkbox-detail" id="replacement-detail" style="display: none;">
                        <input type="text" class="form-input" placeholder="Détail du remplacement">
                    </div>
                </div>

                <div class="checkbox-group" style="margin-top: 16px;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="new-vehicle" name="test_type">
                        <label for="new-vehicle">Pour la mise en route d'un nouveau véhicule</label>
                    </div>
                </div>

                <div class="checkbox-group" style="margin-top: 16px;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="other-context" name="test_type">
                        <label for="other-context">Autre</label>
                    </div>
                    <div class="checkbox-detail" id="other-detail" style="display: none;">
                        <input type="text" class="form-input" placeholder="Préciser le contexte">
                    </div>
                </div>
            </div>

            <!-- SECTION 3 : RÉSULTATS DU TEST -->
            <div class="section">
                <h2 class="section-title">Résultats du test</h2>

                <div class="form-group">
                    <label class="form-label">Humidité</label>
                    <div class="input-with-unit">
                        <input type="number" class="form-input" placeholder="0" step="0.1">
                        <span class="unit">%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Sec</label>
                    <input type="number" class="form-input" placeholder="0" step="0.1">
                </div>

                <div class="form-group">
                    <label class="form-label">Gravimétrie</label>
                    <div class="input-with-unit">
                        <input type="number" class="form-input" placeholder="0" step="0.1">
                        <span class="unit">mg/litre</span>
                    </div>
                </div>
            </div>

            <!-- SECTION 4 : APPROBATIONS -->
            <div class="section">
                <h2 class="section-title">Approbations</h2>

                <div class="form-group">
                    <label class="form-label">Technicien - Nom <span class="required">*</span></label>
                    <input type="text" class="form-input" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Technicien - Signature</label>
                    <textarea class="form-textarea" placeholder="Signature ou initiales"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Superviseur - Nom</label>
                    <input type="text" class="form-input" placeholder="Nom du superviseur">
                </div>

                <div class="form-group">
                    <label class="form-label">Superviseur - Signature</label>
                    <textarea class="form-textarea" placeholder="Signature ou initiales"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Adjoint - Nom</label>
                    <input type="text" class="form-input" placeholder="Nom de l'adjoint">
                </div>

                <div class="form-group">
                    <label class="form-label">Adjoint - Signature</label>
                    <textarea class="form-textarea" placeholder="Signature ou initiales"></textarea>
                </div>
            </div>

            <!-- FORM ACTIONS -->
            <div class="form-actions">
                <button type="submit" class="btn btn-submit">Soumettre</button>
                <button type="button" class="btn btn-preview">Aperçu PDF</button>
                <button type="button" class="btn btn-draft">Sauvegarder en brouillon</button>
            </div>

        </form>

    </div>

    <script>
        // Show/hide detail fields
        document.getElementById('replacement').addEventListener('change', function() {
            document.getElementById('replacement-detail').style.display = this.checked ? 'block' : 'none';
        });

        document.getElementById('other-context').addEventListener('change', function() {
            document.getElementById('other-detail').style.display = this.checked ? 'block' : 'none';
        });

        // Update progress bar on scroll
        window.addEventListener('scroll', function() {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            document.getElementById('progressFill').style.width = scrollPercent + '%';
        });

        // Form submission
        document.getElementById('mainForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Formulaire soumis avec succès !');
        });
    </script>

</body>
</html>
