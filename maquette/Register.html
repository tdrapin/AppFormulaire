<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Plateforme de Formulaires</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #0f2437 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .register-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a3a52;
            margin-bottom: 12px;
        }

        .register-subtitle {
            font-size: 14px;
            color: #7a8a9e;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-input {
            padding: 12px 14px;
            border: 1px solid #d0d7e0;
            border-radius: 6px;
            font-size: 13px;
            color: #2c3e50;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff9a56;
            box-shadow: 0 0 0 3px rgba(255, 154, 86, 0.1);
        }

        .form-input::placeholder {
            color: #b0c4de;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            cursor: pointer;
            margin-top: 4px;
            accent-color: #ff9a56;
        }

        .checkbox-group label {
            cursor: pointer;
            color: #7a8a9e;
            line-height: 1.4;
        }

        .checkbox-group a {
            color: #ff9a56;
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            background: linear-gradient(135deg, #ff9a56 0%, #ff7e5f 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 154, 86, 0.3);
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            color: #7a8a9e;
        }

        .login-link a {
            color: #ff9a56;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #d0d7e0;
            font-size: 13px;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background-color: #d0d7e0;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-social {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #d0d7e0;
            background-color: white;
            color: #2c3e50;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-social:hover {
            background-color: #f0f2f5;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }

            .register-title {
                font-size: 22px;
            }

            .social-buttons {
                flex-direction: column;
            }

            .btn-social {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        
        <div class="logo">FORMULAIRES</div>
        
        <h1 class="register-title">Créer un compte</h1>
        <p class="register-subtitle">Commencez gratuitement en quelques minutes</p>

        <form>
            <div class="form-group">
                <label class="form-label">Nom complet</label>
                <input type="text" class="form-input" placeholder="Jean Dupont" required>
            </div>

            <div class="form-group">
                <label class="form-label">Adresse email</label>
                <input type="email" class="form-input" placeholder="votre@email.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-input" placeholder="Créez un mot de passe sécurisé" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirmer mot de passe</label>
                <input type="password" class="form-input" placeholder="Confirmez votre mot de passe" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a>
                </label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="newsletter">
                <label for="newsletter">
                    Je souhaite recevoir des mises à jour et des offres spéciales
                </label>
            </div>

            <button type="submit" class="btn-register">Créer un compte</button>

            <div class="login-link">
                Vous avez déjà un compte ? <a href="#">Se connecter</a>
            </div>

            <div class="divider">
                <span></span>
                <span>Ou</span>
                <span></span>
            </div>

            <div class="social-buttons">
                <button type="button" class="btn-social">
                    <span>🔵</span> Google
                </button>
                <button type="button" class="btn-social">
                    <span>🔷</span> Microsoft
                </button>
            </div>
        </form>

    </div>

</body>
</html>
